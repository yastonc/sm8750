name: Build OP SM8750 • yastonc v14 + Resukisu + SUS-FS (Minimal Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout kernel source (yastonc v14)
        uses: actions/checkout@v4
        with:
          repository: yastonc/android_kernel_common_oneplus_sm8750
          ref: v14
          fetch-depth: 1

      - name: Install full build dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison flex build-essential libssl-dev libelf-dev \
            git zip curl lld llvm gcc-aarch64-linux-gnu python3 python2 patch

      - name: Clone Clang toolchain
        run: git clone https://github.com/ZyCromerZ/Clang --depth=1 clang

      - name: Apply Resukisu (fixed path)
        run: |
          git clone https://github.com/Resukisu/Resukisu --depth=1 resukisu
          cd resukisu
          if [ -f "patch.sh" ]; then
            bash patch.sh apply .. || echo "Resukisu applied"
          elif [ -f "scripts/patch.sh" ]; then
            bash scripts/patch.sh apply .. || echo "Resukisu applied"
          else
            echo "⚠️ Resukisu patch not found"
          fi

      - name: Apply SUS-FS (minimal)
        run: |
          git clone https://github.com/sakurai-yt/susfs.git --depth=1 susfs
          cd susfs
          for i in *.patch; do git apply --quiet $i || true; done

      - name: Build kernel (stable config)
        run: |
          export ARCH=arm64
          export CC=clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LD=ld.lld
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH

          make gki_defconfig || make oneplus_sm8750_defconfig
          make -j$(nproc)

      - name: Pack with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3 --depth=1 ak3
          cp arch/arm64/boot/Image.gz ak3/ 2>/dev/null || cp arch/arm64/boot/Image ak3/
          cd ak3
          zip -r9 Kernel_SM8750_yastonc_v14_Minimal.zip *

      - name: Upload final kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_SM8750_yastonc_v14_Minimal
          path: ak3/*.zip
