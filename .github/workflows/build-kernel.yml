name: Build_oneplus_sm8750

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: "📝请选择要集成的KSU："
        required: true
        type: choice
        options:
          - 'ReSukiSU'
          - 'SukiSU-Ultra'
        default: 'ReSukiSU'
        
      device_name:
        description: "📝请选择要编译的机型："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_ace_6'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
          - 'realme_GT8'
        default: 'oneplus_ace5_pro'

      keep_original_settings:
        description: "📝保持原内核名称及构建时间(不懂请保持默认)"
        required: false
        default: true
        type: boolean

      custom_kernel_suffix:
        description: "✏️ 自定义内核名称- 仅在取消勾选'保持原设置'时有效"
        required: false
        default: ''
      
      custom_kernel_time:
        description: "⏰ 自定义构建时间- 仅在取消勾选'保持原设置'时有效"
        required: false
        default: ''

      enable_scx:
        description: "添加完美风驰"
        required: false
        default: true
        type: boolean

      enable_bbg:
        description: "开启BBG基带守护"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build_${{ github.event.inputs.device_name }}_${{ github.event.inputs.ksu_type }}
    runs-on: ubuntu-latest
    env:
      KSU_TYPE: ${{ github.event.inputs.ksu_type }}
      DEVICES_NAME: ${{ github.event.inputs.device_name }}
      KEEP_ORIGINAL_SETTINGS: ${{ github.event.inputs.keep_original_settings }}
      CUSTOM_KERNEL_SUFFIX: ${{ github.event.inputs.custom_kernel_suffix }}
      CUSTOM_KERNEL_TIME: ${{ github.event.inputs.custom_kernel_time }}
      ENABLE_SCX: ${{ github.event.inputs.enable_scx }}
      ENABLE_BBG: ${{ github.event.inputs.enable_bbg }}
    steps:
      - uses: actions/checkout@v5

      - name: ⚙️ 设置机型配置
        run: |
          case "${{ env.DEVICES_NAME }}" in
            oneplus_ace5_pro)
              echo "KERNEL_DEFCONFIG=oneplus_sm8750_b_defconfig" >> $GITHUB_ENV
              ;;
            oneplus_13)
              echo "KERNEL_DEFCONFIG=oneplus_sm8750_defconfig" >> $GITHUB_ENV
              ;;
            oneplus_ace_6)
              echo "KERNEL_DEFCONFIG=oneplus_ace6_defconfig" >> $GITHUB_ENV
              ;;
            oneplus_13t)
              echo "KERNEL_DEFCONFIG=oneplus_13t_b_defconfig" >> $GITHUB_ENV
              ;;
            oneplus_pad_2_pro)
              echo "KERNEL_DEFCONFIG=oneplus_pad2pro_b_defconfig" >> $GITHUB_ENV
              ;;
            realme_GT7pro|realme_GT7pro_Speed|realme_GT8)
              echo "KERNEL_DEFCONFIG=oneplus_sm8750_b_defconfig" >> $GITHUB_ENV
              ;;
          esac

          if [ "${{ env.KEEP_ORIGINAL_SETTINGS }}" = "true" ]; then
            echo "DEFAULT_SUFFIX=-yastonc-v14" >> $GITHUB_ENV
            echo "KERNEL_TIME=Fri Sep 19 06:13:40 UTC 2025" >> $GITHUB_ENV
          else
            echo "DEFAULT_SUFFIX=${{ env.CUSTOM_KERNEL_SUFFIX }}" >> $GITHUB_ENV
            echo "KERNEL_TIME=${{ env.CUSTOM_KERNEL_TIME }}" >> $GITHUB_ENV
          fi

      - name: 🛠 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y bc bison flex build-essential libssl-dev libelf-dev git zip curl lld llvm python3 python-is-python3 ccache aria2 zstd unzip

      - name: 🧰 初始化工作区
        run: |
          rm -rf kernel_workspace && mkdir kernel_workspace
          cd kernel_workspace

      - name: 📥 克隆 yastonc 内核源码
        run: |
          cd kernel_workspace
          git clone https://github.com/yastonc/android_kernel_common_oneplus_sm8750.git -b v14 common

      - name: 📥 克隆 Clang18 工具链
        run: |
          cd kernel_workspace
          mkdir -p clang18
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip
          unzip -q clang.zip -d clang18 && rm -f clang.zip

      - name: 🧹 清理 dirty & ABI
        run: |
          cd kernel_workspace/common
          rm -f android/abi_gki_protected_exports_* || true
          for f in scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
          done

      - name: 🧩 集成 KSU
        run: |
          cd kernel_workspace/common
          if [ "$KSU_TYPE" = "ReSukiSU" ]; then
            git clone https://github.com/Resukisu/Resukisu.git --depth=1 ../resukisu
            cd ../resukisu
            bash patch.sh apply ../common || true
          else
            curl -LSs https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/main/kernel/setup.sh | bash -s builtin
          fi

      - name: 🧩 集成 BBG
        if: ${{ env.ENABLE_BBG == 'true' }}
        run: |
          cd kernel_workspace
          git clone https://github.com/BoringBoredGroup/BBG-Kernel-Patches.git --depth=1 bbg
          cd bbg
          for i in *.patch; do git apply --quiet ../common/$i || true; done

      - name: 🧩 集成 SCX 风驰
        if: ${{ env.ENABLE_SCX == 'true' }}
        run: |
          cd kernel_workspace/common
          curl -LSs https://raw.githubusercontent.com/007kylee/scx/main/patch.sh | bash || true

      - name: ⏰ 设置内核构建时间
        run: |
          cd kernel_workspace/common
          mkdir -p include/generated
          cat > include/generated/compile.h << EOF
#define LINUX_COMPILE_TIME "${{ env.KERNEL_TIME }}"
#define LINUX_COMPILE_HOST "yastonc"
EOF

      - name: 🔨 开始编译内核
        run: |
          cd kernel_workspace/common
          export ARCH=arm64
          export CC=../clang18/bin/clang
          export CROSS_COMPILE=aarch64-linux-gnu-
          export LD=../clang18/bin/ld.lld
          export PATH=../clang18/bin:$PATH
          make ${{ env.KERNEL_DEFCONFIG }}
          make -j$(nproc)

      - name: 📦 打包 AnyKernel3
        run: |
          cd kernel_workspace
          git clone https://github.com/osm0sis/AnyKernel3.git --depth=1 ak3
          cp common/arch/arm64/boot/Image.gz ak3/
          cd ak3
          zip -r9 Kernel_${{ env.DEVICES_NAME }}_yastonc.zip *

      - name: 🚀 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_${{ env.DEVICES_NAME }}_yastonc
          path: kernel_workspace/ak3/Kernel_*.zip
